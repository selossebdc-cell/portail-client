<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>To-Do — Semaine du 4 avril</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e0d8;
    min-height: 100vh;
    padding: 24px 16px 120px;
  }
  h1 {
    color: #C27A5A;
    font-size: 1.4rem;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .progress-bar {
    background: #1a1a1a;
    border-radius: 8px;
    height: 8px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    background: #C27A5A;
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s ease;
  }
  .category {
    color: #C27A5A;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 20px 0 10px;
  }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .task input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid #C27A5A;
    border-radius: 6px;
    background: transparent;
    margin-top: 1px;
    cursor: pointer;
    position: relative;
  }
  .task input[type="checkbox"]:checked {
    background: #C27A5A;
  }
  .task input[type="checkbox"]:checked::after {
    content: '\2713';
    color: #0f0f0f;
    font-size: 14px;
    font-weight: bold;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .task.done .task-text { text-decoration: line-through; color: #555; }
  .task-text { font-size: 0.95rem; line-height: 1.4; }
  .task-detail { color: #777; font-size: 0.8rem; margin-top: 2px; }
  .delete-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 1.2rem;
    padding: 4px 8px;
    cursor: pointer;
    margin-left: auto;
    min-width: 30px;
    -webkit-tap-highlight-color: transparent;
  }
  .delete-btn:hover, .delete-btn:active { color: #e55; }
  .add-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .add-row {
    display: flex;
    gap: 8px;
  }
  .add-bar input[type="text"] {
    flex: 1;
    background: #0f0f0f;
    border: 1.5px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e8e0d8;
    font-size: 0.95rem;
    outline: none;
  }
  .add-bar input[type="text"]:focus { border-color: #C27A5A; }
  .add-bar input[type="text"]::placeholder { color: #555; }
  .add-btn {
    background: #C27A5A;
    border: none;
    border-radius: 8px;
    color: #0f0f0f;
    font-weight: 700;
    font-size: 1.3rem;
    width: 44px;
    min-width: 44px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn:active { opacity: 0.7; }
  .counter-row {
    text-align: center;
    font-size: 0.85rem;
    color: #C27A5A;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>Ma semaine</h1>
<div class="subtitle">Semaine du 4 avril 2026</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div id="task-list">

<div class="category">Filles</div>

<label class="task" data-id="caf">
  <input type="checkbox" checked disabled>
  <div><div class="task-text" style="text-decoration:line-through;color:#555;">CAF + virement</div></div>
</label>

<label class="task" data-id="accord">
  <input type="checkbox">
  <div><div class="task-text">Accord parental — r&eacute;diger l'accord p&egrave;re/m&egrave;re</div>
  <div class="task-detail">Pour que ta fille puisse partir</div></div>
</label>

<label class="task" data-id="amaia">
  <input type="checkbox">
  <div><div class="task-text">Amaia — agent recherche appart</div>
  <div class="task-detail">D&eacute;finir quartier, budget, crit&egrave;res avec Claude</div></div>
</label>

<div class="category">Voyages</div>

<label class="task" data-id="marrakech">
  <input type="checkbox" checked disabled>
  <div><div class="task-text" style="text-decoration:line-through;color:#555;">H&ocirc;tel Marrakech</div></div>
</label>

<div class="category">Finances</div>

<label class="task" data-id="fonds">
  <input type="checkbox">
  <div><div class="task-text">Rapatrier les fonds</div>
  <div class="task-detail">Transf&eacute;rer vers le compte principal</div></div>
</label>

<label class="task" data-id="menage">
  <input type="checkbox">
  <div><div class="task-text">Payer la fin de m&eacute;nage</div></div>
</label>

<div class="category">Administratif</div>

<label class="task" data-id="domiciliation">
  <input type="checkbox">
  <div><div class="task-text">Domiciliation — envoyer les documents</div></div>
</label>

<label class="task" data-id="voiture">
  <input type="checkbox">
  <div><div class="task-text">Voiture — appeler le garage</div>
  <div class="task-detail">Petites r&eacute;parations</div></div>
</label>

<div class="category">Clients</div>

<label class="task" data-id="feeduc">
  <input type="checkbox">
  <div><div class="task-text">FEEDUC — questionnaire retour utilisation</div></div>
</label>

<div class="category">Contenu / Visibilit&eacute;</div>

<label class="task" data-id="linkedin">
  <input type="checkbox">
  <div><div class="task-text">LinkedIn — publier la vid&eacute;o</div>
  <div class="task-detail">Aujourd'hui vendredi 4 avril</div></div>
</label>

<label class="task" data-id="substack">
  <input type="checkbox">
  <div><div class="task-text">Substack — cr&eacute;er le compte + strat&eacute;gie</div></div>
</label>

</div>

<div id="custom-tasks"></div>

<div class="add-bar">
  <div class="add-row">
    <input type="text" id="new-task" placeholder="Ajouter une t&acirc;che..." enterkeyhint="done">
    <button class="add-btn" id="add-btn">+</button>
  </div>
  <div class="counter-row" id="counter"></div>
</div>

<script>
const STORAGE_KEY = 'todo-semaine-4avril';
const CUSTOM_KEY = 'todo-semaine-4avril-custom';
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let customTasks = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]');

const fixedAlreadyDone = 2; // CAF + Marrakech

function saveChecks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

function saveCustom() {
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(customTasks));
}

// Init fixed tasks
document.querySelectorAll('#task-list .task[data-id]').forEach(task => {
  const id = task.dataset.id;
  const cb = task.querySelector('input[type="checkbox"]');
  if (cb.disabled) return;

  if (saved[id]) {
    cb.checked = true;
    task.classList.add('done');
  }

  cb.addEventListener('change', () => {
    task.classList.toggle('done', cb.checked);
    saved[id] = cb.checked;
    saveChecks();
    updateProgress();
  });
});

// Render custom tasks
function renderCustom() {
  const container = document.getElementById('custom-tasks');
  container.innerHTML = '';
  if (customTasks.length > 0) {
    const cat = document.createElement('div');
    cat.className = 'category';
    cat.textContent = 'Ajout\u00e9es';
    container.appendChild(cat);
  }
  customTasks.forEach((t, i) => {
    const label = document.createElement('label');
    label.className = 'task' + (t.done ? ' done' : '');
    label.innerHTML = '<input type="checkbox"' + (t.done ? ' checked' : '') + '>' +
      '<div><div class="task-text">' + escapeHtml(t.text) + '</div></div>' +
      '<button class="delete-btn" data-idx="' + i + '">\u00d7</button>';

    const cb = label.querySelector('input');
    cb.addEventListener('change', () => {
      customTasks[i].done = cb.checked;
      label.classList.toggle('done', cb.checked);
      saveCustom();
      updateProgress();
    });

    const del = label.querySelector('.delete-btn');
    del.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      customTasks.splice(i, 1);
      saveCustom();
      renderCustom();
      updateProgress();
    });

    container.appendChild(label);
  });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function addTask() {
  const input = document.getElementById('new-task');
  const text = input.value.trim();
  if (!text) return;
  customTasks.push({ text: text, done: false });
  saveCustom();
  renderCustom();
  updateProgress();
  input.value = '';
  input.focus();
}

document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('new-task').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); addTask(); }
});

function updateProgress() {
  const fixedTasks = document.querySelectorAll('#task-list .task[data-id]');
  let done = fixedAlreadyDone;
  let total = fixedAlreadyDone;

  fixedTasks.forEach(t => {
    const cb = t.querySelector('input[type="checkbox"]');
    if (!cb.disabled) {
      total++;
      if (cb.checked) done++;
    }
  });

  total += customTasks.length;
  done += customTasks.filter(t => t.done).length;

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('counter').textContent = done + ' / ' + total + ' \u2014 ' + pct + '%';
}

renderCustom();
updateProgress();
</script>
</body>
</html>
