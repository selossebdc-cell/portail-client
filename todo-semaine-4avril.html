<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do — Semaine du 4 avril</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e0d8;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }
  h1 {
    color: #C27A5A;
    font-size: 1.4rem;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .progress-bar {
    background: #1a1a1a;
    border-radius: 8px;
    height: 8px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    background: #C27A5A;
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s ease;
  }
  .category {
    color: #C27A5A;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 20px 0 10px;
  }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .task input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid #C27A5A;
    border-radius: 6px;
    background: transparent;
    margin-top: 1px;
    cursor: pointer;
    position: relative;
  }
  .task input[type="checkbox"]:checked {
    background: #C27A5A;
  }
  .task input[type="checkbox"]:checked::after {
    content: '✓';
    color: #0f0f0f;
    font-size: 14px;
    font-weight: bold;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .task.done .task-text { text-decoration: line-through; color: #555; }
  .task-text { font-size: 0.95rem; line-height: 1.4; }
  .task-detail { color: #777; font-size: 0.8rem; margin-top: 2px; }
  .counter {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 14px;
    text-align: center;
    font-size: 0.9rem;
    color: #C27A5A;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>Ma semaine</h1>
<div class="subtitle">Semaine du 4 avril 2026</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="category">Filles</div>

<label class="task" data-id="caf">
  <input type="checkbox" checked disabled>
  <div><div class="task-text" style="text-decoration:line-through;color:#555;">CAF + virement</div></div>
</label>

<label class="task" data-id="accord">
  <input type="checkbox">
  <div><div class="task-text">Accord parental — rédiger l'accord père/mère</div>
  <div class="task-detail">Pour que ta fille puisse partir</div></div>
</label>

<label class="task" data-id="amaia">
  <input type="checkbox">
  <div><div class="task-text">Amaia — agent recherche appart</div>
  <div class="task-detail">Définir quartier, budget, critères avec Claude</div></div>
</label>

<div class="category">Voyages</div>

<label class="task" data-id="marrakech">
  <input type="checkbox" checked disabled>
  <div><div class="task-text" style="text-decoration:line-through;color:#555;">Hôtel Marrakech</div></div>
</label>

<div class="category">Finances</div>

<label class="task" data-id="fonds">
  <input type="checkbox">
  <div><div class="task-text">Rapatrier les fonds</div>
  <div class="task-detail">Transférer vers le compte principal</div></div>
</label>

<label class="task" data-id="menage">
  <input type="checkbox">
  <div><div class="task-text">Payer la fin de ménage</div></div>
</label>

<div class="category">Administratif</div>

<label class="task" data-id="domiciliation">
  <input type="checkbox">
  <div><div class="task-text">Domiciliation — envoyer les documents</div></div>
</label>

<label class="task" data-id="voiture">
  <input type="checkbox">
  <div><div class="task-text">Voiture — appeler le garage</div>
  <div class="task-detail">Petites réparations</div></div>
</label>

<div class="category">Clients</div>

<label class="task" data-id="feeduc">
  <input type="checkbox">
  <div><div class="task-text">FEEDUC — questionnaire retour utilisation</div></div>
</label>

<div class="category">Contenu / Visibilité</div>

<label class="task" data-id="linkedin">
  <input type="checkbox">
  <div><div class="task-text">LinkedIn — publier la vidéo</div>
  <div class="task-detail">Aujourd'hui vendredi 4 avril</div></div>
</label>

<label class="task" data-id="substack">
  <input type="checkbox">
  <div><div class="task-text">Substack — créer le compte + stratégie</div></div>
</label>

<div class="counter" id="counter"></div>

<script>
const STORAGE_KEY = 'todo-semaine-4avril';
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
const tasks = document.querySelectorAll('.task[data-id]');
const total = 9; // hors CAF et Marrakech déjà faits
const alreadyDone = 2;

tasks.forEach(task => {
  const id = task.dataset.id;
  const cb = task.querySelector('input[type="checkbox"]');
  if (cb.disabled) return; // already done items

  if (saved[id]) {
    cb.checked = true;
    task.classList.add('done');
  }

  cb.addEventListener('change', () => {
    task.classList.toggle('done', cb.checked);
    saved[id] = cb.checked;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    updateProgress();
  });
});

function updateProgress() {
  let checked = alreadyDone;
  tasks.forEach(t => {
    const cb = t.querySelector('input[type="checkbox"]');
    if (cb.checked) checked++;
  });
  const pct = Math.round((checked / (total + alreadyDone)) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('counter').textContent = checked + ' / ' + (total + alreadyDone) + ' — ' + pct + '%';
}
updateProgress();
</script>
</body>
</html>
