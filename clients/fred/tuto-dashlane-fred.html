<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuto Dashlane — Tes mots de passe, enfin au même endroit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .login-container {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }
  .login-box {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
  }
  .login-brand {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C27A5A;
    margin-bottom: 24px;
  }
  .login-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(194,122,90,0.1);
    border: 2px solid rgba(194,122,90,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    margin: 0 auto 24px;
  }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .login-subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 32px;
  }
  .login-input {
    width: 100%;
    padding: 14px 20px;
    background: #0f0f0f;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    text-align: center;
    letter-spacing: 2px;
    transition: border-color 0.2s;
    outline: none;
  }
  .login-input:focus { border-color: #C27A5A; }
  .login-input::placeholder {
    color: #444;
    letter-spacing: 0;
    font-size: 0.9rem;
  }
  .login-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: #C27A5A;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #a8654a; }
  .login-btn:disabled {
    opacity: 0.5;
    cursor: wait;
  }
  .login-error {
    margin-top: 16px;
    padding: 10px 16px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    color: #f87171;
    font-size: 0.85rem;
    display: none;
  }
  .login-footer {
    margin-top: 24px;
    font-size: 0.75rem;
    color: #444;
  }
  .login-footer span { color: #C27A5A; }
  .login-secure {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 16px;
    font-size: 0.75rem;
    color: #555;
  }
</style>
</head>
<body>

<div class="login-container" id="login-screen">
  <div class="login-box">
    <div class="login-brand">CS Consulting Strategique</div>
    <div class="login-icon">🔒</div>
    <h1 class="login-title">Espace Client</h1>
    <p class="login-subtitle">Entre ton mot de passe pour acceder a ton espace</p>
    <form onsubmit="return unlock(event)">
      <input type="password" class="login-input" id="pwd" placeholder="Mot de passe" autocomplete="current-password" autofocus>
      <button type="submit" class="login-btn" id="btn">Acceder a mon espace</button>
    </form>
    <div class="login-error" id="error">Mot de passe incorrect. Reessaie ou contacte Catherine.</div>
    <div class="login-secure">🔐 Connexion chiffree de bout en bout</div>
  </div>
  <div class="login-footer" style="text-align:center;">
    <span>CS Consulting Strategique</span> — Espace client securise
  </div>
</div>

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decrypt(password) {
  const salt = b64ToBytes(ENCRYPTED.salt);
  const iv = b64ToBytes(ENCRYPTED.iv);
  const data = b64ToBytes(ENCRYPTED.data);
  const key = await deriveKey(password, salt);
  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: iv }, key, data
  );
  return new TextDecoder().decode(decrypted);
}

async function tryDecrypt(pwd) {
  const html = await decrypt(pwd);
  // Stocker en sessionStorage pour les autres pages protegees
  try { sessionStorage.setItem("cs-portal-key", pwd); } catch(_) {}
  document.open();
  document.write(html);
  document.close();
}

async function unlock(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  const btn = document.getElementById("btn");
  const err = document.getElementById("error");

  if (!pwd) return false;
  btn.disabled = true;
  btn.textContent = "Dechiffrement...";
  err.style.display = "none";

  try {
    await tryDecrypt(pwd);
  } catch (_) {
    err.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Acceder a mon espace";
    document.getElementById("pwd").value = "";
    document.getElementById("pwd").focus();
  }
  return false;
}

// Auto-unlock si deja authentifie dans cette session navigateur
window.addEventListener("load", async () => {
  try {
    const saved = sessionStorage.getItem("cs-portal-key");
    if (saved) {
      await tryDecrypt(saved);
      return;
    }
  } catch(_) {}
  // Sinon, auto-submit si navigateur a pre-rempli
  setTimeout(() => {
    if (document.getElementById("pwd") && document.getElementById("pwd").value) {
      unlock(new Event("submit"));
    }
  }, 200);
});
</script>
