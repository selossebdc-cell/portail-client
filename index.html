<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS — Consulting Stratégique | Espace Client</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-card__title" style="color:var(--terracotta)">CS</h1>
      <p class="login-card__subtitle">Consulting Stratégique — Espace Client</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="votre@email.fr" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" class="input" placeholder="Votre mot de passe" required autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:var(--space-md)">Se connecter</button>
      </form>

      <p style="text-align:center;margin-top:var(--space-lg);font-size:var(--font-size-xs);color:var(--text-muted)">
        Mot de passe oublié ? Contactez Catherine.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      try {
        const session = await getSession();
        if (session) {
          window.location.href = 'app.html';
          return;
        }
      } catch (e) { console.error('Session check:', e); }

      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('login-error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.remove('visible');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = form.querySelector('button[type="submit"]');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Connexion...';

        try {
          if (typeof db === 'undefined') throw new Error('Supabase non chargé');
          if (typeof signIn === 'undefined') throw new Error('signIn non défini');
          const result = await signIn(email, password);
          window.location.href = 'app.html';
        } catch (err) {
          errorEl.textContent = err.message || 'Email ou mot de passe incorrect.';
          errorEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      });
    })();
  </script>
</body>
</html>
